name: Destroy EC2

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe DESTROY para confirmar el borrado de todos los stacks'
        required: true
        default: ''

jobs:

  destroy:
    runs-on: ubuntu-latest

    steps:

      - name: Validar confirmacion
        if: ${{ github.event.inputs.confirm != 'DESTROY' }}
        run: |
          echo "❌ Confirmacion incorrecta. Escribe DESTROY para continuar."
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Orden inverso al deploy — los que tienen dependencias se borran primero

      # 1️⃣ Automation — depende de alb-asg-stack
      - name: Destruir automation-stack
        run: |
          echo "🗑️  Eliminando automation-stack..."
          aws cloudformation delete-stack --stack-name automation-stack
          aws cloudformation wait stack-delete-complete --stack-name automation-stack
          echo "✅ automation-stack eliminado."

      # 2️⃣ ALB + ASG — depende de security-stack
      - name: Destruir alb-asg-stack
        run: |
          echo "🗑️  Eliminando alb-asg-stack..."
          aws cloudformation delete-stack --stack-name alb-asg-stack
          aws cloudformation wait stack-delete-complete --stack-name alb-asg-stack
          echo "✅ alb-asg-stack eliminado."

      # 3️⃣ EC2 estatica — depende de security-stack
      - name: Destruir ec2-stack
        run: |
          echo "🗑️  Eliminando ec2-stack..."
          aws cloudformation delete-stack --stack-name ec2-stack
          aws cloudformation wait stack-delete-complete --stack-name ec2-stack
          echo "✅ ec2-stack eliminado."

      # 4️⃣ Security — ultimo, ya sin dependencias
      - name: Destruir security-stack
        run: |
          echo "🗑️  Eliminando security-stack..."
          aws cloudformation delete-stack --stack-name security-stack
          aws cloudformation wait stack-delete-complete --stack-name security-stack
          echo "✅ security-stack eliminado."
