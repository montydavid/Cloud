name: Destroy EC2

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe DESTROY para confirmar el borrado del stack'
        required: true
        default: ''

jobs:

  destroy:

    runs-on: ubuntu-latest

    steps:

      - name: Validar confirmacion
        if: ${{ github.event.inputs.confirm != 'DESTROY' }}
        run: |
          echo "❌ Confirmacion incorrecta. Escribe DESTROY para continuar."
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verificar que el stack existe
        run: |
          aws cloudformation describe-stacks \
            --stack-name ec2-stack-clase \
            --query "Stacks[0].StackStatus" \
            --output text

      - name: Destruir CloudFormation Stack
        run: |
          echo "🗑️  Eliminando stack ec2-stack-clase..."
          aws cloudformation delete-stack \
            --stack-name ec2-stack-clase

      - name: Esperar a que el stack sea eliminado
        run: |
          echo "⏳ Esperando eliminacion completa..."
          aws cloudformation wait stack-delete-complete \
            --stack-name ec2-stack-clase
          echo "✅ Stack eliminado exitosamente."
