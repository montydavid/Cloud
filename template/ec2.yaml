AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 creada desde GitHub Actions con pagina de bienvenida

Resources:

  # ---------- Security Group ----------
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permite HTTP y SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: SG-GitHubActions

  # ---------- EC2 ----------
  MyEC2:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro
      SecurityGroups:
        - !Ref WebSecurityGroup

      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e

          # ── Actualizar e instalar nginx ──────────────────────────────────
          yum update -y
          yum install -y nginx

          # ── Obtener metadata de la instancia ────────────────────────────
          TOKEN=$(curl -sX PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-id)
          REGION=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/placement/region)
          AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/placement/availability-zone)
          PUBLIC_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/public-ipv4)
          INSTANCE_TYPE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-type)
          LAUNCH_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')

          # ── Crear pagina HTML ────────────────────────────────────────────
          cat > /usr/share/nginx/html/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>EC2 · GitHubActions</title>
            <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

              :root {
                --bg:       #0a0a0f;
                --surface:  #111118;
                --border:   #1e1e2e;
                --accent:   #00e5ff;
                --accent2:  #ff4ecd;
                --green:    #00ff9f;
                --text:     #e2e2f0;
                --muted:    #5a5a7a;
                --card:     #13131f;
              }

              html, body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: 'Syne', sans-serif;
                overflow-x: hidden;
              }

              /* ── Grid de fondo ── */
              body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image:
                  linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
                z-index: 0;
              }

              /* ── Orbes de fondo ── */
              body::after {
                content: '';
                position: fixed;
                top: -200px; left: -200px;
                width: 600px; height: 600px;
                background: radial-gradient(circle, rgba(0,229,255,.07) 0%, transparent 70%);
                pointer-events: none;
                z-index: 0;
                animation: drift 12s ease-in-out infinite alternate;
              }

              @keyframes drift {
                from { transform: translate(0, 0); }
                to   { transform: translate(120px, 80px); }
              }

              .orb2 {
                position: fixed;
                bottom: -150px; right: -150px;
                width: 500px; height: 500px;
                background: radial-gradient(circle, rgba(255,78,205,.07) 0%, transparent 70%);
                pointer-events: none;
                z-index: 0;
                animation: drift2 15s ease-in-out infinite alternate;
              }

              @keyframes drift2 {
                from { transform: translate(0, 0); }
                to   { transform: translate(-100px, -60px); }
              }

              .wrapper {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 48px 24px;
                gap: 40px;
              }

              /* ── Header ── */
              .header {
                text-align: center;
                animation: fadeUp .8s ease both;
              }

              .badge {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background: rgba(0,229,255,.08);
                border: 1px solid rgba(0,229,255,.25);
                border-radius: 100px;
                padding: 6px 16px;
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                color: var(--accent);
                letter-spacing: .1em;
                text-transform: uppercase;
                margin-bottom: 24px;
              }

              .badge::before {
                content: '';
                width: 6px; height: 6px;
                border-radius: 50%;
                background: var(--green);
                box-shadow: 0 0 8px var(--green);
                animation: pulse 2s ease infinite;
              }

              @keyframes pulse {
                0%, 100% { opacity: 1; }
                50%       { opacity: .3; }
              }

              h1 {
                font-size: clamp(2.4rem, 6vw, 4.5rem);
                font-weight: 800;
                line-height: 1.05;
                letter-spacing: -.02em;
              }

              h1 span.accent  { color: var(--accent); }
              h1 span.accent2 { color: var(--accent2); }

              .subtitle {
                margin-top: 16px;
                color: var(--muted);
                font-size: 1rem;
                font-weight: 400;
                letter-spacing: .01em;
              }

              /* ── Cards de stats ── */
              .stats {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 16px;
                width: 100%;
                max-width: 860px;
                animation: fadeUp .8s .2s ease both;
              }

              .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 20px 24px;
                position: relative;
                overflow: hidden;
                transition: border-color .3s, transform .3s;
              }

              .card:hover {
                border-color: rgba(0,229,255,.3);
                transform: translateY(-3px);
              }

              .card::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--accent), transparent);
                opacity: 0;
                transition: opacity .3s;
              }

              .card:hover::before { opacity: 1; }

              .card-label {
                font-family: 'JetBrains Mono', monospace;
                font-size: 10px;
                letter-spacing: .12em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 8px;
              }

              .card-value {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                color: var(--accent);
                word-break: break-all;
              }

              .card-icon {
                position: absolute;
                top: 20px; right: 20px;
                font-size: 18px;
                opacity: .25;
              }

              /* ── Terminal block ── */
              .terminal {
                width: 100%;
                max-width: 860px;
                background: #0d0d14;
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
                animation: fadeUp .8s .4s ease both;
                box-shadow: 0 24px 60px rgba(0,0,0,.5);
              }

              .terminal-bar {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 12px 16px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
              }

              .dot { width: 12px; height: 12px; border-radius: 50%; }
              .dot.r { background: #ff5f57; }
              .dot.y { background: #ffbd2e; }
              .dot.g { background: #28c840; }

              .terminal-title {
                flex: 1;
                text-align: center;
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                color: var(--muted);
              }

              .terminal-body {
                padding: 24px;
                font-family: 'JetBrains Mono', monospace;
                font-size: 13px;
                line-height: 2;
              }

              .line { display: flex; gap: 12px; }
              .prompt { color: var(--green); user-select: none; }
              .cmd    { color: var(--text); }
              .out    { color: var(--muted); padding-left: 28px; }
              .val    { color: var(--accent); }
              .val2   { color: var(--accent2); }

              .cursor {
                display: inline-block;
                width: 8px; height: 14px;
                background: var(--accent);
                vertical-align: middle;
                animation: blink 1.1s step-end infinite;
              }

              @keyframes blink {
                0%, 100% { opacity: 1; }
                50%       { opacity: 0; }
              }

              /* ── Footer ── */
              footer {
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                color: var(--muted);
                letter-spacing: .06em;
                animation: fadeUp .8s .6s ease both;
              }

              footer span { color: var(--accent2); }

              @keyframes fadeUp {
                from { opacity: 0; transform: translateY(24px); }
                to   { opacity: 1; transform: translateY(0); }
              }
            </style>
          </head>
          <body>
            <div class="orb2"></div>
            <div class="wrapper">

              <div class="header">
                <div class="badge">instancia activa</div>
                <h1>
                  <span class="accent">EC2</span> desplegada<br/>
                  desde <span class="accent2">GitHub</span>
                </h1>
                <p class="subtitle">Infraestructura gestionada con CloudFormation · AWS</p>
              </div>

              <div class="stats">
                <div class="card">
                  <div class="card-icon">🖥</div>
                  <div class="card-label">Instance ID</div>
                  <div class="card-value">$INSTANCE_ID</div>
                </div>
                <div class="card">
                  <div class="card-icon">🌎</div>
                  <div class="card-label">Región / AZ</div>
                  <div class="card-value">$REGION<br/>$AZ</div>
                </div>
                <div class="card">
                  <div class="card-icon">⚡</div>
                  <div class="card-label">Tipo</div>
                  <div class="card-value">$INSTANCE_TYPE</div>
                </div>
                <div class="card">
                  <div class="card-icon">🌐</div>
                  <div class="card-label">IP Pública</div>
                  <div class="card-value">$PUBLIC_IP</div>
                </div>
                <div class="card">
                  <div class="card-icon">🕐</div>
                  <div class="card-label">Lanzada</div>
                  <div class="card-value">$LAUNCH_TIME</div>
                </div>
                <div class="card">
                  <div class="card-icon">✅</div>
                  <div class="card-label">Estado</div>
                  <div class="card-value" style="color:var(--green)">running</div>
                </div>
              </div>

              <div class="terminal">
                <div class="terminal-bar">
                  <div class="dot r"></div>
                  <div class="dot y"></div>
                  <div class="dot g"></div>
                  <div class="terminal-title">bash — ec2-user@$INSTANCE_ID</div>
                </div>
                <div class="terminal-body">
                  <div class="line"><span class="prompt">❯</span><span class="cmd">aws cloudformation describe-stacks --stack-name ec2-stack-clase</span></div>
                  <div class="out">StackStatus: <span class="val">CREATE_COMPLETE</span></div>
                  <div class="out">DeployedBy:  <span class="val2">GitHub Actions</span></div>
                  <div class="out">Region:      <span class="val">$REGION</span></div>
                  <br/>
                  <div class="line"><span class="prompt">❯</span><span class="cmd">systemctl status nginx</span></div>
                  <div class="out">● nginx.service — <span class="val">active (running)</span></div>
                  <div class="out">Loaded: <span class="val">enabled</span></div>
                  <br/>
                  <div class="line"><span class="prompt">❯</span><span class="cursor"></span></div>
                </div>
              </div>

              <footer>Desplegado el $LAUNCH_TIME · stack <span>ec2-stack-clase</span> · aws/$REGION</footer>

            </div>
          </body>
          </html>
          HTMLEOF

          # ── Iniciar nginx ────────────────────────────────────────────────
          systemctl enable nginx
          systemctl start nginx

      Tags:
        - Key: Name
          Value: EC2-GitHubActions

Outputs:

  InstanceId:
    Value: !Ref MyEC2

  PublicIP:
    Description: IP publica de la instancia
    Value: !GetAtt MyEC2.PublicIp

  WebURL:
    Description: URL para ver la pagina de bienvenida
    Value: !Sub "http://${MyEC2.PublicIp}"
