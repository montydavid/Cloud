AWSTemplateFormatVersion: '2010-09-09'
Description: Scheduled Actions + Launch Template v2 + ASG actualizado

Resources:

  # ── Launch Template Version 2 ─────────────────────────────────────────
  # Crea una nueva version del LT existente con una AMI/userdata actualizada
  LaunchTemplateV2:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: LT-ASG-v2
      LaunchTemplateData:
        ImageId: ami-0cca150d127c2216f
        InstanceType: t3.micro
        SecurityGroupIds:
          - !ImportValue security-stack-EC2SGId
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install -y httpd
            TOKEN=$(curl -sX PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/instance-id)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)
            cat > /var/www/html/index.html << HTMLEOF
            <!DOCTYPE html>
            <html lang="es">
            <head>
              <meta charset="UTF-8"/>
              <title>ASG · v2</title>
              <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
              <style>
                body { margin:0; background:#0f0a14; color:#e2e2f0; font-family:'Syne',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:24px; }
                .badge { background:rgba(255,78,205,.1); border:1px solid rgba(255,78,205,.3); border-radius:100px; padding:6px 18px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#ff4ecd; text-transform:uppercase; letter-spacing:.1em; }
                h1 { font-size:3rem; font-weight:800; margin:0; } .a { color:#ff4ecd; } .b { color:#00e5ff; }
                .info { font-family:'JetBrains Mono',monospace; font-size:13px; color:#5a5a7a; text-align:center; line-height:2; }
                .val { color:#00ff9f; } .new { color:#ff4ecd; font-weight:bold; }
              </style>
            </head>
            <body>
              <div class="badge">🚀 version 2 · automation stack</div>
              <h1><span class="a">AUTO</span><span class="b">MATION</span></h1>
              <div class="info">
                Instance: <span class="val">$INSTANCE_ID</span><br/>
                AZ: <span class="val">$AZ</span><br/>
                Launch Template: <span class="new">v2 — actualizada</span>
              </div>
            </body>
            </html>
            HTMLEOF
            systemctl enable httpd
            systemctl start httpd
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: ASG-Instance-v2

  # ── Actualizar ASG para usar LT v2 ────────────────────────────────────
  ASGUpdateV2:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !ImportValue alb-asg-stack-ASGName
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '2'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplateV2
        Version: !GetAtt LaunchTemplateV2.LatestVersionNumber
      VPCZoneIdentifier:
        - !Select [0, !GetAZs '']
      TargetGroupARNs:
        - !ImportValue alb-asg-stack-TGArn

  # ── Scheduled Actions de INCREMENTO ──────────────────────────────────
  ScaleUpMorning:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !ImportValue alb-asg-stack-ASGName
      DesiredCapacity: 3
      MinSize: 2
      MaxSize: 4
      # Todos los dias laborales a las 8:00 AM UTC
      Recurrence: "0 8 * * MON-FRI"

  ScaleUpAfternoon:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !ImportValue alb-asg-stack-ASGName
      DesiredCapacity: 4
      MinSize: 3
      MaxSize: 4
      # Todos los dias laborales a las 13:00 (hora pico)
      Recurrence: "0 13 * * MON-FRI"

  # ── Scheduled Actions de REDUCCION ───────────────────────────────────
  ScaleDownEvening:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !ImportValue alb-asg-stack-ASGName
      DesiredCapacity: 2
      MinSize: 1
      MaxSize: 3
      # Todos los dias a las 20:00 UTC
      Recurrence: "0 20 * * *"

  ScaleDownNight:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !ImportValue alb-asg-stack-ASGName
      DesiredCapacity: 1
      MinSize: 1
      MaxSize: 2
      # Todos los dias a las 00:00 UTC (minimo nocturno)
      Recurrence: "0 0 * * *"

Outputs:

  LaunchTemplateV2Id:
    Description: ID del Launch Template version 2
    Value: !Ref LaunchTemplateV2

  LaunchTemplateV2Version:
    Description: Numero de version del Launch Template v2
    Value: !GetAtt LaunchTemplateV2.LatestVersionNumber

  ScaleUpMorningAction:
    Description: Scheduled Action incremento manana (08:00 UTC L-V)
    Value: !Ref ScaleUpMorning

  ScaleUpAfternoonAction:
    Description: Scheduled Action incremento tarde (13:00 UTC L-V)
    Value: !Ref ScaleUpAfternoon

  ScaleDownEveningAction:
    Description: Scheduled Action reduccion tarde-noche (20:00 UTC)
    Value: !Ref ScaleDownEvening

  ScaleDownNightAction:
    Description: Scheduled Action reduccion nocturna (00:00 UTC)
    Value: !Ref ScaleDownNight
