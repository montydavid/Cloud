AWSTemplateFormatVersion: '2010-09-09'
Description: ALB + Target Group + Launch Template + Auto Scaling Group + Warm Pool

Parameters:

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID de la VPC donde se desplegara la infraestructura

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Lista de subnets publicas (minimo 2 AZ)

Resources:

  # ── Target Group ─────────────────────────────────────────────────────
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: TG-ALB-ASG
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: TG-ALB-ASG

  # ── Application Load Balancer ─────────────────────────────────────────
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ALB-GitHubActions
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !ImportValue security-stack-ALBSGId
      Subnets: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: ALB-GitHubActions

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── Launch Template (Version 1) ───────────────────────────────────────
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: LT-ASG-v1
      LaunchTemplateData:
        ImageId: ami-0cca150d127c2216f
        InstanceType: t3.micro
        SecurityGroupIds:
          - !ImportValue security-stack-EC2SGId
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install -y httpd
            TOKEN=$(curl -sX PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/instance-id)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)
            cat > /var/www/html/index.html << HTMLEOF
            <!DOCTYPE html>
            <html lang="es">
            <head>
              <meta charset="UTF-8"/>
              <title>ASG · v1</title>
              <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
              <style>
                body { margin:0; background:#0a0a0f; color:#e2e2f0; font-family:'Syne',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:24px; }
                .badge { background:rgba(0,229,255,.1); border:1px solid rgba(0,229,255,.3); border-radius:100px; padding:6px 18px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#00e5ff; text-transform:uppercase; letter-spacing:.1em; }
                h1 { font-size:3rem; font-weight:800; margin:0; } .a { color:#00e5ff; } .b { color:#ff4ecd; }
                .info { font-family:'JetBrains Mono',monospace; font-size:13px; color:#5a5a7a; text-align:center; line-height:2; }
                .val { color:#00ff9f; }
              </style>
            </head>
            <body>
              <div class="badge">auto scaling group · version 1</div>
              <h1><span class="a">ALB</span> + <span class="b">ASG</span></h1>
              <div class="info">
                Instance: <span class="val">$INSTANCE_ID</span><br/>
                AZ: <span class="val">$AZ</span><br/>
                Launch Template: <span class="val">v1</span>
              </div>
            </body>
            </html>
            HTMLEOF
            systemctl enable httpd
            systemctl start httpd
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: ASG-Instance-v1

  # ── Auto Scaling Group ────────────────────────────────────────────────
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: ASG-GitHubActions
      MinSize: '1'
      MaxSize: '3'
      DesiredCapacity: '1'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier: !Ref SubnetIds
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 120
      Tags:
        - Key: Name
          Value: ASG-GitHubActions
          PropagateAtLaunch: true

  # ── Warm Pool ─────────────────────────────────────────────────────────
  WarmPool:
    Type: AWS::AutoScaling::WarmPool
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      MinSize: 1
      PoolState: Stopped

Outputs:

  ALBDNSName:
    Description: DNS publico del Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: alb-asg-stack-ALBDNS

  ALBArn:
    Description: ARN del ALB
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: alb-asg-stack-ALBArn

  TargetGroupArn:
    Description: ARN del Target Group
    Value: !Ref TargetGroup
    Export:
      Name: alb-asg-stack-TGArn

  AutoScalingGroupName:
    Description: Nombre del Auto Scaling Group
    Value: !Ref AutoScalingGroup
    Export:
      Name: alb-asg-stack-ASGName

  LaunchTemplateId:
    Description: ID del Launch Template
    Value: !Ref LaunchTemplate
    Export:
      Name: alb-asg-stack-LTId

  WebURL:
    Description: URL publica del balanceador
    Value: !Sub "http://${ApplicationLoadBalancer.DNSName}"
